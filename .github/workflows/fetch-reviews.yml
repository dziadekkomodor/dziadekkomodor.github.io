name: Fetch Google Reviews

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  # Adds a "Run workflow" button in GitHub → Actions → Fetch Google Reviews
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Fetch reviews
        env:
          # Set this in: GitHub repo → Settings → Secrets and variables → Actions → Variables → New repository variable
          # Name: GOOGLE_MAPS_URL
          # Value: your full Google Maps listing URL (e.g. https://www.google.com/maps/place/Dziadek+Komodor/...)
          GOOGLE_MAPS_URL: ${{ vars.GOOGLE_MAPS_URL }}
        run: node scripts/fetch-reviews.mjs

      - name: Commit updated reviews
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/reviews.json
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: update Google reviews [skip ci]"
          git push
